apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: ai-platform
data:
  # Non-secret settings. Keys become env var names when referenced.
  LOG_LEVEL: "INFO"
  LLM_MODE: "stub"
  # In-cluster DNS: Service name "postgres" / "redis" in this namespace.
  # Must match how pydantic Settings reads env (DATABASE_URL, REDIS_URL).
  DATABASE_URL: "postgresql+psycopg://app:app@postgres:5432/app"
  REDIS_URL: "redis://redis:6379/0"