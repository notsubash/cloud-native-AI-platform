apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: ai-platform
type: Opaque
stringData:
  # stringData = plain text in the file; API stores it base64 in etcd.
  # Still NOT encryption. Do not put real production keys in Git long-term.
  POSTGRES_USER: "app"
  POSTGRES_PASSWORD: "app"
  POSTGRES_DB: "app"
  # Optional; empty is fine while LLM_MODE=stub
  DEEPSEEK_API_KEY: ""